<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ganimede — GI EHR</title>
<!-- Favicon: the logo's 'M' glyph, white on brand teal -->
<link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="6 10 166 206"><rect x="6" y="10" width="166" height="206" rx="34" fill="%230f6b5c"/><g fill="none" stroke="%23ffffff" stroke-linecap="round" stroke-linejoin="round"><path stroke-width="9" d="M 25 170 C 25 161.33 25 137.17 25 118 C 25 98.83 24.17 69.33 25 55 C 25.83 40.67 26.17 36.83 30 32 C 33.83 27.17 41 22.67 48 26 C 55 29.33 65 39 72 52 C 79 65 84 104 90 104 C 96 104 101 65 108 52 C 115 39 125 29.33 132 26 C 139 22.67 146.17 27.17 150 32 C 153.83 36.83 154.17 40.67 155 55 C 155.83 69.33 155 98.83 155 118 C 155 137.17 155 161.33 155 170"/><path stroke-width="9" d="M 25 168 C 22 192 52 194 48 173 C 45 156 28 163 41 197"/><path stroke-width="8" d="M 154 172 C 153 184 145 190 137 192"/></g></svg>'>
<style>
/* ============================================================
   DESIGN SYSTEM  (Part A)
   Single-file prototype. No backend. All state in localStorage.
   ============================================================ */
:root{
  --bg:#f4f6f9;
  --surface:#ffffff;
  --surface-2:#fafbfc;
  --border:#e3e8ef;
  --border-strong:#cfd6e0;
  --text:#1a2433;
  --text-2:#5a6672;
  --text-3:#8a94a2;
  /* ---- BRAND PALETTE (single source of truth) ----
     Change these 3 values (or use the top-bar palette picker) and the whole
     app re-skins. The picker in the top bar just overwrites these at runtime. */
  --brand:#0f6b5c;      /* primary brand color */
  --brand-2:#11856f;    /* hover / darker */
  --brand-soft:#e6f2ef; /* tint for backgrounds & active nav */
  --accent:#2563eb;
  --accent-soft:#e8f0fe;
  --warn:#b45309;
  --warn-soft:#fef3e2;
  --danger:#b91c1c;
  --danger-soft:#fdeaea;
  --ok:#15803d;
  --ok-soft:#e7f4ec;
  --radius:10px;
  --radius-sm:7px;
  --shadow:0 1px 2px rgba(16,24,40,.06),0 1px 3px rgba(16,24,40,.05);
  --shadow-lg:0 8px 24px rgba(16,24,40,.10);
  --font:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
a{color:inherit}

/* ---------- App shell ---------- */
.app{display:grid;grid-template-columns:236px 1fr;grid-template-rows:56px 1fr;height:100vh}
.topbar{grid-column:1/3;display:flex;align-items:center;gap:16px;padding:0 20px;background:var(--surface);border-bottom:1px solid var(--border);z-index:5}

/* LOGO SLOT — Ganimede wordmark as a bold teal badge (tracks the brand color). */
#logo-slot{
  flex:0 0 auto;display:flex;align-items:center;
  background:var(--brand);border-radius:10px;padding:8px 15px;
}
#logo-slot svg{height:27px;width:auto;display:block}

.topbar-search{flex:1;max-width:420px;position:relative}
.topbar-search input{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 12px 0 34px;font-size:13px;background:var(--surface-2);color:var(--text)}
.topbar-search input:focus{outline:none;border-color:var(--brand);background:#fff}
.topbar-search svg{position:absolute;left:11px;top:9px;color:var(--text-3)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.topbar-pill{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-2);background:var(--surface-2);border:1px solid var(--border);padding:5px 10px;border-radius:20px}
/* Palette picker */
.palette-wrap{position:relative}
.palette-btn{display:flex;align-items:center;gap:7px;height:34px;padding:0 10px;border:1px solid var(--border);border-radius:20px;background:var(--surface-2);color:var(--text-2)}
.palette-btn:hover{background:#fff;border-color:var(--border-strong)}
.swatch-dot{width:14px;height:14px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
.palette-menu{position:absolute;top:42px;right:0;background:#fff;border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-lg);padding:10px;width:210px;display:none;z-index:20}
.palette-menu.open{display:block}
.palette-menu .pm-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);padding:2px 6px 8px}
.palette-opt{display:flex;align-items:center;gap:10px;width:100%;border:none;background:none;padding:8px 8px;border-radius:8px;text-align:left;font-size:13px;font-weight:500;color:var(--text)}
.palette-opt:hover{background:var(--surface-2)}
.palette-opt.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
.palette-opt .sw{width:16px;height:16px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.08)}
.palette-opt .chk{margin-left:auto;color:var(--brand)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ok)}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px}

/* ---------- Sidebar ---------- */
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:14px 12px;overflow-y:auto;display:flex;flex-direction:column}
.nav-group-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;color:var(--text-3);text-transform:uppercase;padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:8px;color:var(--text-2);font-weight:500;font-size:13.5px;border:none;background:none;width:100%;text-align:left;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
.nav-item .ico{width:18px;height:18px;flex:0 0 auto;display:flex;align-items:center;justify-content:center}
.nav-item .count{margin-left:auto;font-size:11px;font-weight:700;background:var(--danger-soft);color:var(--danger);padding:1px 7px;border-radius:10px}
.nav-item.soon{opacity:.55}
.nav-item .soon-tag{margin-left:auto;font-size:9.5px;font-weight:700;letter-spacing:.06em;color:var(--text-3);border:1px solid var(--border);padding:1px 6px;border-radius:9px}
.sidebar-foot{margin-top:auto;padding:12px 10px 4px;font-size:11px;color:var(--text-3);border-top:1px solid var(--border)}

/* ---------- Main ---------- */
.main{overflow-y:auto;padding:24px 28px 60px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.01em}
.page-sub{color:var(--text-2);font-size:13px;margin-top:3px}
.btn{height:36px;padding:0 15px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;color:var(--text);font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{background:var(--surface-2)}
.btn.primary{background:var(--brand);border-color:var(--brand);color:#fff}
.btn.primary:hover{background:var(--brand-2)}

/* KPI cards */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 16px;box-shadow:var(--shadow)}
.kpi .label{font-size:12px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:7px}
.kpi .val{font-size:27px;font-weight:700;margin-top:8px;letter-spacing:-.02em}
.kpi .meta{font-size:11.5px;margin-top:3px;color:var(--text-3)}
.kpi .val.warn{color:var(--warn)}
.kpi .val.danger{color:var(--danger)}
.kpi .val.brand{color:var(--brand)}

/* Panels / worklists */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border)}
.panel-title{font-weight:700;font-size:14px;display:flex;align-items:center;gap:9px}
.panel-title .badge{font-size:11px;font-weight:700;padding:1px 8px;border-radius:10px}
.badge.red{background:var(--danger-soft);color:var(--danger)}
.badge.amber{background:var(--warn-soft);color:var(--warn)}
.badge.blue{background:var(--accent-soft);color:var(--accent)}
.badge.green{background:var(--ok-soft);color:var(--ok)}
.panel-link{font-size:12px;color:var(--brand);font-weight:600;background:none;border:none}
.panel-body{max-height:none}

.row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.row:last-child{border-bottom:none}
.row:hover{background:var(--surface-2)}
.row .who{font-weight:600;font-size:13.5px}
.row .sub{font-size:12px;color:var(--text-2);margin-top:1px}
.row .rt{margin-left:auto;text-align:right;flex:0 0 auto}
.row .rt .t{font-size:12px;color:var(--text-3)}
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:11px;white-space:nowrap}
.pill.red{background:var(--danger-soft);color:var(--danger)}
.pill.amber{background:var(--warn-soft);color:var(--warn)}
.pill.blue{background:var(--accent-soft);color:var(--accent)}
.pill.green{background:var(--ok-soft);color:var(--ok)}
.pill.gray{background:#eef1f5;color:var(--text-2)}
.mini-av{width:30px;height:30px;border-radius:50%;background:#dbe4e1;color:var(--brand);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px;flex:0 0 auto}

/* Schedule */
.seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
.seg button{border:none;background:none;padding:7px 14px;border-radius:7px;font-weight:600;font-size:13px;color:var(--text-2)}
.seg button.active{background:#fff;color:var(--brand);box-shadow:var(--shadow)}
.sched-wrap{display:grid;grid-template-columns:64px 1fr;gap:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.sched-col-head{grid-column:1/3;display:grid;grid-template-columns:64px 1fr;border-bottom:1px solid var(--border);background:var(--surface-2)}
.sched-col-head .rh{padding:10px 12px;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em}
.time-col{border-right:1px solid var(--border)}
.time-slot{height:70px;padding:6px 8px;font-size:11px;color:var(--text-3);text-align:right;border-bottom:1px solid var(--border)}
.slot-col{position:relative}
.slot-cell{height:70px;border-bottom:1px solid var(--border)}
.appt{position:absolute;left:8px;right:8px;border-radius:8px;padding:7px 10px;font-size:12px;overflow:hidden;border-left:3px solid;box-shadow:var(--shadow);cursor:pointer}
.appt:hover{filter:brightness(.98)}
.appt .a-who{font-weight:700;font-size:12.5px}
.appt .a-type{font-size:11px;opacity:.9;margin-top:1px}
.appt.office{background:var(--accent-soft);border-color:var(--accent);color:#1e3a8a}
.appt.newpt{background:var(--brand-soft);border-color:var(--brand);color:#0f5145}
.appt.scope{background:#eef2f7;border-color:#475569;color:#1e293b}
.appt.egd{background:var(--warn-soft);border-color:var(--warn);color:#7c4a10}
.appt.block-open{background:repeating-linear-gradient(45deg,#f7f9fb,#f7f9fb 8px,#eef1f5 8px,#eef1f5 16px);border-color:var(--border-strong);color:var(--text-3)}
.legend{display:flex;gap:16px;flex-wrap:wrap;margin:14px 2px 0;font-size:12px;color:var(--text-2)}
.legend span{display:inline-flex;align-items:center;gap:6px}
.legend i{width:11px;height:11px;border-radius:3px;display:inline-block}

/* Placeholder pages for later parts */
.soon-page{background:var(--surface);border:1px dashed var(--border-strong);border-radius:var(--radius);padding:48px;text-align:center;color:var(--text-2);margin-top:8px}
.soon-page h3{font-size:17px;color:var(--text);margin-bottom:8px}
.soon-page .tag{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--brand);background:var(--brand-soft);padding:4px 11px;border-radius:20px;margin-bottom:16px;text-transform:uppercase}
.soon-page ul{display:inline-block;text-align:left;margin-top:14px;color:var(--text-2);font-size:13px;line-height:1.9}

.section-gap{height:22px}

/* ---------- Patient chart (Part B) ---------- */
.pt-header{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:16px}
.pt-header .big-av{width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;flex:0 0 auto}
.pt-header .name{font-size:19px;font-weight:700}
.pt-header .demo{font-size:12.5px;color:var(--text-2);margin-top:2px}
.pt-facts{margin-left:auto;display:flex;gap:26px;flex-wrap:wrap}
.pt-fact{font-size:12px}
.pt-fact .k{color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;font-size:10.5px}
.pt-fact .v{font-weight:600;margin-top:2px}
.pt-select{height:34px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;font-weight:600;color:var(--text);background:var(--surface-2)}
.chart-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.chart-grid.wide{grid-template-columns:1fr 1fr}
.list-item{padding:9px 16px;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:9px;align-items:flex-start}
.list-item:last-child{border-bottom:none}
.list-item .lead{width:6px;height:6px;border-radius:50%;background:var(--brand);margin-top:7px;flex:0 0 auto}
.list-item.allergy .lead{background:var(--danger)}
.enc-item{padding:10px 16px;border-bottom:1px solid var(--border)}
.enc-item:last-child{border-bottom:none}
.enc-item .ed{font-size:11px;color:var(--text-3);font-weight:600}
.enc-item .et{font-size:13px;font-weight:600;margin-top:1px}
.enc-item .ew{font-size:12px;color:var(--text-2)}

/* ---------- Office note (Part B) ---------- */
.note-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:16px;align-items:start}
.note-build{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.nb-section{border-bottom:1px solid var(--border);padding:14px 16px}
.nb-section:last-child{border-bottom:none}
.nb-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3);margin-bottom:10px}
.nb-group{margin-bottom:12px}
.nb-group:last-child{margin-bottom:0}
.nb-glabel{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:7px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:20px;border:1px solid var(--border-strong);background:#fff;font-size:12.5px;font-weight:500;color:var(--text-2);margin:0 6px 6px 0}
.chip:hover{border-color:var(--brand);color:var(--brand)}
.chip.on{background:var(--brand-soft);border-color:var(--brand);color:var(--brand);font-weight:600}
.chip.on::before{content:"✓";font-size:11px;font-weight:800}
/* Live note preview */
.note-preview{position:sticky;top:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.np-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.np-head .pt{font-weight:700;font-size:13px}
.np-body{padding:16px 18px;font-size:13px;line-height:1.65;max-height:560px;overflow-y:auto}
.np-body h4{font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--brand);margin:14px 0 4px;font-weight:700}
.np-body h4:first-child{margin-top:0}
.np-body p{color:var(--text);margin-bottom:2px}
.np-body .ph{color:var(--text-3);font-style:italic}
.speed-bar{display:flex;align-items:center;gap:14px;background:var(--brand-soft);border:1px solid var(--brand);border-radius:var(--radius);padding:11px 16px;margin-bottom:16px;flex-wrap:wrap}
.speed-bar .sb-metric{font-size:13px;color:var(--brand);font-weight:600}
.speed-bar .sb-metric b{font-size:16px}
.speed-bar .vs{color:var(--text-3);font-size:12px;text-decoration:line-through}
.speed-bar .sb-spacer{margin-left:auto}
.tmpl-seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
.tmpl-seg button{border:none;background:none;padding:6px 12px;border-radius:7px;font-weight:600;font-size:12.5px;color:var(--text-2)}
.tmpl-seg button.active{background:#fff;color:var(--brand);box-shadow:var(--shadow)}

/* ---------- Colonoscopy builder (Part C) ---------- */
.stepper{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.step{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:9px;border:1px solid var(--border);background:var(--surface);font-size:13px;font-weight:600;color:var(--text-3)}
.step .num{width:20px;height:20px;border-radius:50%;background:#eef1f5;color:var(--text-3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.step.active{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
.step.active .num{background:var(--brand);color:#fff}
.step.done{color:var(--ok)}
.step.done .num{background:var(--ok);color:#fff}
.proc-layout{display:grid;grid-template-columns:1.02fr .98fr;gap:16px;align-items:start}
.form-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.field{flex:1;min-width:140px}
.field label{display:block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);margin-bottom:5px}
.field select,.field input{width:100%;height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-size:13px;font-weight:500;color:var(--text);background:var(--surface-2)}
.field select:focus,.field input:focus{outline:none;border-color:var(--brand);background:#fff}
.qseg{display:flex;gap:6px;flex-wrap:wrap}
.qseg button{border:1px solid var(--border-strong);background:#fff;border-radius:7px;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--text-2)}
.qseg button.on{background:var(--brand-soft);border-color:var(--brand);color:var(--brand)}
.qseg button.on.warn{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.qseg button.on.bad{background:var(--danger-soft);border-color:var(--danger);color:var(--danger)}
.polyp{border:1px solid var(--border);border-radius:9px;padding:12px;margin-bottom:10px;background:var(--surface-2)}
.polyp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.polyp-head .pt{font-weight:700;font-size:13px}
.polyp-head .rm{border:none;background:none;color:var(--danger);font-size:12px;font-weight:600}
.add-polyp{width:100%;border:1px dashed var(--border-strong);background:var(--surface-2);border-radius:9px;padding:11px;font-weight:600;color:var(--brand);font-size:13px}
.add-polyp:hover{background:var(--brand-soft)}
/* Report preview */
.report{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;position:sticky;top:0}
.report-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface-2)}
.report-tabs button{flex:1;border:none;background:none;padding:11px;font-size:12.5px;font-weight:600;color:var(--text-2);border-bottom:2px solid transparent}
.report-tabs button.active{color:var(--brand);border-bottom-color:var(--brand);background:#fff}
.report-body{padding:16px 18px;font-size:13px;line-height:1.62;max-height:600px;overflow-y:auto}
.report-body h4{font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--brand);margin:13px 0 3px;font-weight:700}
.report-body h4:first-child{margin-top:0}
.report-body .mono{white-space:pre-wrap;font-size:12.5px}
/* Magic moment / path */
.path-card{border:1px solid var(--border);border-radius:9px;padding:13px 14px;margin-bottom:10px;background:var(--surface-2)}
.path-card .pc-head{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.path-card .spec{font-weight:700;font-size:13px}
.path-card select{height:32px;border:1px solid var(--border);border-radius:7px;padding:0 8px;font-size:12.5px;font-weight:600;background:#fff;width:100%}
.magic-banner{background:linear-gradient(90deg,var(--brand-soft),#fff);border:1px solid var(--brand);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.magic-banner .ic{width:34px;height:34px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
.magic-banner .mt{font-weight:700;font-size:14px;color:var(--brand)}
.magic-banner .ms{font-size:12.5px;color:var(--text-2)}
.surv-result{border:2px solid var(--brand);border-radius:var(--radius);overflow:hidden;margin-bottom:14px}
.surv-hero{background:var(--brand);color:#fff;padding:18px 20px;display:flex;align-items:center;gap:18px}
.surv-hero .big{font-size:38px;font-weight:800;letter-spacing:-.02em;line-height:1}
.surv-hero .lbl{font-size:13px;opacity:.9}
.surv-hero .lbl b{font-size:15px}
.surv-detail{padding:14px 18px;font-size:13px;line-height:1.6}
.surv-detail .cite{font-size:12px;color:var(--text-3);margin-top:8px;border-top:1px solid var(--border);padding-top:8px}
.recall-made{background:var(--ok-soft);border:1px solid var(--ok);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:14px}
.recall-made .ic{width:32px;height:32px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;flex:0 0 auto}

/* ---------- Recall dashboard (Part D) ---------- */
.filter-seg{display:inline-flex;background:var(--surface-2);border:1px solid var(--border);border-radius:9px;padding:3px}
.filter-seg button{border:none;background:none;padding:7px 13px;border-radius:7px;font-weight:600;font-size:12.5px;color:var(--text-2)}
.filter-seg button.active{background:#fff;color:var(--brand);box-shadow:var(--shadow)}
.tbl{width:100%;border-collapse:collapse;font-size:13px}
.tbl th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.tbl td{padding:11px 14px;border-bottom:1px solid var(--border)}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--surface-2)}
.tbl .who{font-weight:600}
.tbl .money{font-weight:700;font-variant-numeric:tabular-nums}
.mini-btn{height:30px;padding:0 11px;border-radius:7px;border:1px solid var(--brand);background:var(--brand);color:#fff;font-weight:600;font-size:12px}
.mini-btn.ghost{background:#fff;color:var(--brand)}

/* ---------- Financial (Part D) ---------- */
.bars{display:flex;align-items:flex-end;gap:12px;height:180px;padding:14px 16px 0}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:7px;height:100%;justify-content:flex-end}
.bar{width:100%;max-width:44px;background:var(--brand);border-radius:6px 6px 0 0;position:relative;transition:height .3s}
.bar.alt{background:var(--brand-soft);border:1px solid var(--brand)}
.bar-lbl{font-size:11px;color:var(--text-3);font-weight:600}
.bar-val{font-size:11px;color:var(--text);font-weight:700}
.hbars{padding:6px 16px 14px}
.hbar-row{display:flex;align-items:center;gap:10px;margin:9px 0;font-size:12.5px}
.hbar-row .hl{width:92px;color:var(--text-2);font-weight:600}
.hbar-track{flex:1;height:16px;background:var(--surface-2);border-radius:8px;overflow:hidden}
.hbar-fill{height:100%;border-radius:8px}
.hbar-row .hv{width:64px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.donut-wrap{display:flex;align-items:center;gap:18px;padding:16px}
.legend-list{font-size:12.5px}
.legend-list div{display:flex;align-items:center;gap:8px;margin:6px 0}
.legend-list i{width:11px;height:11px;border-radius:3px}

/* ---------- Vision & roadmap (Part D) ---------- */
.vision-sheet{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 28px;margin-bottom:16px}
.vision-sheet h2{font-size:18px;margin-bottom:4px}
.vision-sheet .lede{color:var(--text-2);font-size:13.5px;margin-bottom:18px;max-width:70ch}
.arch{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:6px}
.arch-col{border:1px solid var(--border);border-radius:9px;overflow:hidden}
.arch-col h5{font-size:11px;text-transform:uppercase;letter-spacing:.06em;background:var(--surface-2);padding:9px 12px;color:var(--brand);border-bottom:1px solid var(--border)}
.arch-col ul{list-style:none;padding:8px 12px}
.arch-col li{font-size:12.5px;padding:4px 0;color:var(--text)}
.moat{background:var(--brand-soft);border:1px solid var(--brand);border-radius:9px;padding:12px 14px;margin-top:14px;font-size:13px;color:var(--text)}
.roadmap{position:relative}
.phase{display:grid;grid-template-columns:132px 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--border)}
.phase:last-child{border-bottom:none}
.phase .pn{font-weight:700;font-size:13.5px}
.phase .pn .tag{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:6px}
.phase .pd{font-size:13px;color:var(--text-2);line-height:1.55}
.tag.now{background:var(--ok-soft);color:var(--ok)}
.tag.next{background:var(--warn-soft);color:var(--warn)}
.tag.later{background:#eef1f5;color:var(--text-2)}
.print-btn{float:right}
@media print{.sidebar,.topbar,.print-btn{display:none}.app{display:block}.main{padding:0}}

@media(max-width:1100px){.kpi-row{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.chart-grid,.chart-grid.wide{grid-template-columns:1fr}.note-layout,.proc-layout{grid-template-columns:1fr}.arch{grid-template-columns:1fr 1fr}}

/* ---------- Lock screen (password gate) ---------- */
#lock{position:fixed;inset:0;z-index:1000;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(155deg,var(--brand),var(--brand-2));color:#fff;padding:24px;text-align:center}
body.locked #lock{display:flex}
body.locked .app{display:none}
body.locked{overflow:hidden}
#lock .lock-logo svg{height:88px;width:auto;display:block;margin-bottom:26px}
#lock p{font-size:16px;font-weight:500;opacity:.95;margin-bottom:24px;letter-spacing:.01em}
#lock .lock-form{display:flex;gap:9px;background:#fff;padding:8px;border-radius:14px;box-shadow:0 14px 40px rgba(0,0,0,.25)}
#lock input{border:none;outline:none;height:46px;width:240px;padding:0 16px;font-size:15px;border-radius:9px;color:var(--text);background:#fff}
#lock button{height:46px;padding:0 24px;border:none;border-radius:9px;background:var(--brand);color:#fff;font-weight:700;font-size:15px;cursor:pointer}
#lock button:hover{background:var(--brand-2)}
#lock .lock-err{min-height:22px;margin-top:16px;color:#ffdede;font-size:13.5px;font-weight:600;opacity:0;transition:opacity .18s}
#lock .lock-err.show{opacity:1}
#lock .lock-foot{position:absolute;bottom:22px;font-size:11px;opacity:.7;letter-spacing:.03em}

  {id:"blue",   name:"Clinical Blue", brand:"#1d5fd6", brand2:"#1a53bd", soft:"#e8f0fe"},

  {id:"plum",   name:"Plum",      brand:"#8b2f74", brand2:"#772863", soft:"#f6e9f2"}
];
const THEME_KEY = "gi_ehr_theme";
function applyTheme(id){
  const t = THEMES.find(x=>x.id===id) || THEMES[0];
  const r = document.documentElement.style;
  r.setProperty("--brand", t.brand);
  r.setProperty("--brand-2", t.brand2);
  r.setProperty("--brand-soft", t.soft);
  localStorage.setItem(THEME_KEY, t.id);
  const dot = document.getElementById("active-swatch");
  if(dot) dot.style.background = t.brand;
  renderPaletteMenu(t.id);
}
function renderPaletteMenu(activeId){
  const menu = document.getElementById("palette-menu");
  if(!menu) return;
  menu.innerHTML = `<div class="pm-title">Brand palette</div>` + THEMES.map(t=>`
    <button class="palette-opt ${t.id===activeId?'active':''}" onclick="applyTheme('${t.id}');togglePalette()">
      <span class="sw" style="background:${t.brand}"></span>${t.name}
      ${t.id===activeId?'<span class="chk">✓</span>':''}
    </button>`).join("");
}
function togglePalette(e){
  if(e) e.stopPropagation();
  document.getElementById("palette-menu").classList.toggle("open");
}
document.addEventListener("click",()=>document.getElementById("palette-menu")?.classList.remove("open"));

let CURRENT = "dashboard";
function renderNav(){
  const sb = document.getElementById("sidebar");
  let html = "";
  NAV.forEach(n=>{
    if(n.group){ html += `<div class="nav-group-label">${n.group}</div>`; return; }
    const active = n.id===CURRENT ? "active":"";
    const soon = n.ready ? "" : "soon";
    let right = "";
    if(n.id==="dashboard") right = `<span class="count">6</span>`;
    else if(!n.ready) right = `<span class="soon-tag">${n.part}</span>`;
    html += `<button class="nav-item ${active} ${soon}" onclick="go('${n.id}')">
      ${icon(n.icon())}<span>${n.label}</span>${right}</button>`;
  });
  html += `<div class="sidebar-foot">Phase 1 · Part A prototype<br>Dashboard + Schedule live</div>`;
  sb.innerHTML = html;
  document.getElementById("user-initials").textContent = DB.provider.initials;
}
function go(id){ CURRENT=id; renderNav(); render(); document.getElementById("main").scrollTop=0; }

/* ============================================================
   RENDER
   ============================================================ */
function render(){
  const m = document.getElementById("main");
  if(CURRENT==="dashboard") m.innerHTML = viewDashboard();
  else if(CURRENT==="schedule") m.innerHTML = viewSchedule();
  else if(CURRENT==="chart") m.innerHTML = viewChart();
  else if(CURRENT==="note") m.innerHTML = viewNote();
  else if(CURRENT==="procedure") m.innerHTML = viewProcedure();
  else if(CURRENT==="recalls") m.innerHTML = viewRecalls();
  else if(CURRENT==="financials") m.innerHTML = viewFinancials();
  else if(CURRENT==="vision") m.innerHTML = viewVision();
  else m.innerHTML = viewSoon(CURRENT);
  if(CURRENT==="note") mountNote();
}

/* ---------- SCHEDULE ---------- */
let SCHED_VIEW = "office";
function setSched(v){ SCHED_VIEW=v; render(); }

function viewSchedule(){
  const isOffice = SCHED_VIEW==="office";
  const data = isOffice ? DB.scheduleOffice : DB.scheduleProc;
  const startHr = 7, endHr = 15;           // 7a–3p grid
  const pxPerHr = 70;
  const hours = [];
  for(let h=startHr; h<endHr; h++) hours.push(h);

  const timeCol = hours.map(h=>{
    const label = (h===12)?"12 pm":(h<12?`${h} am`:`${h-12} pm`);
    return `<div class="time-slot">${label}</div>`;
  }).join("");
  const cells = hours.map(()=>`<div class="slot-cell"></div>`).join("");

  const appts = data.map(a=>{
    const top = (a.start-startHr)*pxPerHr;
    const height = a.len*pxPerHr - 4;
    const p = a.pid ? pt(a.pid) : {name:a.name||"—"};
    const t = fmtTime(a.start);
    return `<div class="appt ${a.cls}" style="top:${top+2}px;height:${height}px">
      <div class="a-who">${t} · ${p.name}</div>
      <div class="a-type">${a.type}${a.pid?` · ${p.mrn}`:""}</div>
    </div>`;
  }).join("");

  const officeCount = DB.scheduleOffice.filter(a=>a.pid).length;
  const procCount = DB.scheduleProc.filter(a=>a.pid).length;
  const openBlocks = data.filter(a=>!a.pid).length;

  return `
  <div class="page-head">
    <div>
      <div class="page-title">Schedule</div>
      <div class="page-sub">Tuesday, July 7 · ${DB.provider.name}</div>
    </div>
    <div class="seg">
      <button class="${isOffice?'active':''}" onclick="setSched('office')">Office day</button>
      <button class="${!isOffice?'active':''}" onclick="setSched('proc')">Procedure block</button>
    </div>
  </div>

  <div class="kpi-row" style="grid-template-columns:repeat(3,1fr)">
    <div class="kpi"><div class="label">${isOffice?'Office visits':'Procedures'} booked</div><div class="val brand">${isOffice?officeCount:procCount}</div><div class="meta">${isOffice?'2 new patients':'6 colonoscopy · 3 EGD'}</div></div>
    <div class="kpi"><div class="label">Open slots</div><div class="val ${openBlocks?'warn':''}">${openBlocks}</div><div class="meta">${isOffice?'Fill from recall list':'ASC capacity available'}</div></div>
    <div class="kpi"><div class="label">${isOffice?'Suite (other tab)':'Est. facility charges'}</div><div class="val">${isOffice?procCount+' proc':'$18.6k'}</div><div class="meta">${isOffice?'on procedure block':'faux · closes owner pitch'}</div></div>
  </div>

  <div class="sched-wrap">
    <div class="sched-col-head">
      <div class="rh">Time</div>
      <div class="rh">${isOffice?'Clinic — Dr. Reyes':'Endoscopy Suite — Room 2'}</div>
    </div>
    <div class="time-col">${timeCol}</div>
    <div class="slot-col">${cells}${appts}</div>
  </div>

  <div class="legend">
    ${isOffice
      ? `<span><i style="background:var(--accent)"></i> Follow-up</span><span><i style="background:var(--brand)"></i> New patient</span><span><i style="background:var(--border-strong)"></i> Open slot</span>`
      : `<span><i style="background:#475569"></i> Colonoscopy</span><span><i style="background:var(--warn)"></i> EGD</span><span><i style="background:var(--border-strong)"></i> Open block</span>`}
  </div>`;
}
function fmtTime(h){
  const hr = Math.floor(h); const min = Math.round((h-hr)*60);
  const ap = hr<12?"a":"p"; const hh = hr>12?hr-12:hr;
  return `${hh}:${min.toString().padStart(2,"0")}${ap}`;
}

let NOTE = { tmpl:"gerd", pid:"p3", sel:{}, clicks:0 };
function noteReset(keepTmpl){ NOTE.sel={}; NOTE.clicks=0; }
function setTmpl(t){ NOTE.tmpl=t; NOTE.pid = t==="gerd"?"p3":"p2"; noteReset(true); render(); }
function toggleChip(gid, k, multi){
  NOTE.clicks++;
  if(multi){
    NOTE.sel[gid] = NOTE.sel[gid] || [];
    const i = NOTE.sel[gid].indexOf(k);
    if(i>=0) NOTE.sel[gid].splice(i,1); else NOTE.sel[gid].push(k);
  }else{
    NOTE.sel[gid] = (NOTE.sel[gid] && NOTE.sel[gid][0]===k) ? [] : [k];
  }
  paintNote();
}
function isOn(gid,k){ return NOTE.sel[gid] && NOTE.sel[gid].indexOf(k)>=0; }

function viewNote(){
  const tpl = NOTE_TEMPLATES[NOTE.tmpl];
  const p = pt(NOTE.pid);
  const builder = tpl.sections.map(sec=>`
    <div class="nb-section">
      <div class="nb-title">${sec.t}</div>
      ${sec.groups.map(g=>`
        <div class="nb-group">
          <div class="nb-glabel">${g.l}${g.multi?'':' <span style="color:var(--text-3);font-weight:400">(pick one)</span>'}</div>
          <div>${g.opts.map(o=>`<button class="chip ${isOn(g.id,o.k)?'on':''}" onclick="toggleChip('${g.id}','${o.k}',${g.multi})">${o.x}</button>`).join("")}</div>
        </div>`).join("")}
    </div>`).join("");

  return `
  <div class="page-head">
    <div><div class="page-title">Office Visit Note</div><div class="page-sub">${p.name} · ${p.age} yo ${p.sex==='M'?'M':'F'} · ${p.mrn}</div></div>
    <div class="tmpl-seg">
      <button class="${NOTE.tmpl==='gerd'?'active':''}" onclick="setTmpl('gerd')">GERD follow-up</button>
      <button class="${NOTE.tmpl==='bleed'?'active':''}" onclick="setTmpl('bleed')">Rectal bleeding</button>
    </div>
  </div>

  <div class="speed-bar" id="speed-bar"></div>

  <div class="note-layout">
    <div class="note-build">${builder}</div>
    <div class="note-preview">
      <div class="np-head"><div class="pt">Note preview · ${p.name}</div><button class="btn primary" style="height:30px;padding:0 12px" onclick="signNote()">Sign note</button></div>
      <div class="np-body" id="np-body"></div>
    </div>
  </div>`;
}

function buildNarrative(){
  const tpl = NOTE_TEMPLATES[NOTE.tmpl];
  const sel = NOTE.sel;
  const phrase = ids => ids.map(id=>{
    const g = findGroup(id); if(!g) return [];
    const chosen = (sel[id]||[]).map(k=>{const o=g.opts.find(z=>z.k===k);return o?o.x:null}).filter(Boolean);
    return chosen;
  }).flat();
  const cap = s => s? s.charAt(0).toUpperCase()+s.slice(1) : s;

  let out = "";
  const p = pt(NOTE.pid);
  out += `<h4>Chief Complaint</h4><p>${tpl.cc}</p>`;

  // HPI
  const hpiIds = tpl.sections.find(s=>s.t==="HPI").groups.map(g=>g.id);
  const hpiPhrases = phrase(hpiIds);
  out += `<h4>History of Present Illness</h4>`;
  if(hpiPhrases.length){
    out += `<p>${p.name.split(" ")[0]} is a ${p.age}-year-old ${p.sex==='M'?'man':'woman'} who ${joinClauses(hpiPhrases)}.</p>`;
  }else{ out += `<p class="ph">Select HPI options to build the narrative…</p>`; }

  // ROS / Exam / A&P
  ["ROS","Exam","Assessment & Plan"].forEach(secT=>{
    const sec = tpl.sections.find(s=>s.t===secT); if(!sec) return;
    const ids = sec.groups.map(g=>g.id);
    const ph = phrase(ids);
    const title = secT==="ROS"?"Review of Systems":secT;
    out += `<h4>${title}</h4>`;
    if(!ph.length){ out += `<p class="ph">— not yet documented —</p>`; return; }
    if(secT==="Assessment & Plan"){
      out += `<p>${p.age} yo ${p.sex==='M'?'M':'F'} — ${tpl.label}.</p>`;
      out += ph.map((s,i)=>`<p>${i+1}. ${cap(s)}</p>`).join("");
    }else{
      out += `<p>${cap(joinClauses(ph))}.</p>`;
    }
  });
  return out;
}
function findGroup(id){
  const tpl = NOTE_TEMPLATES[NOTE.tmpl];
  for(const s of tpl.sections){ const g=s.groups.find(x=>x.id===id); if(g) return g; }
  return null;
}
function joinClauses(arr){
  if(arr.length===1) return arr[0];
  return arr.slice(0,-1).join(", ") + ", and " + arr[arr.length-1];
}

const LOCATIONS = ["Cecum","Ascending colon","Hepatic flexure","Transverse colon","Splenic flexure","Descending colon","Sigmoid colon","Rectum"];

/* ---- Guideline library (2020 USMSTF post-polypectomy) ---- */
function computeSurveillance(polyps){
  const adenoHist = ["Tubular adenoma","Tubulovillous adenoma","Villous adenoma","Adenoma w/ high-grade dysplasia"];
  const adenomas = polyps.filter(p=>adenoHist.includes(p.histo));
  const ssls = polyps.filter(p=>p.histo==="Sessile serrated lesion");
  const cancer = polyps.some(p=>p.histo==="Adenocarcinoma");
  const nAd = adenomas.length;
  const advanced = adenomas.some(p=> p.size>=10 || p.histo==="Villous adenoma" || p.histo==="Tubulovillous adenoma" || p.histo==="Adenoma w/ high-grade dysplasia");
  const bigPiecemeal = polyps.some(p=> p.size>=20 && p.tech==="EMR (piecemeal)");
  const advFeatures = [];
  adenomas.forEach(p=>{
    if(p.size>=10) advFeatures.push(`${p.size} mm adenoma`);
    if(p.histo==="Tubulovillous adenoma"||p.histo==="Villous adenoma") advFeatures.push("villous histology");
    if(p.histo==="Adenoma w/ high-grade dysplasia") advFeatures.push("high-grade dysplasia");
  });
  const G = "USMSTF post-polypectomy surveillance guideline (Gastroenterology 2020)";

  if(cancer) return {years:null,label:"Oncology referral",rationale:"Invasive adenocarcinoma identified. This falls outside routine surveillance — refer for oncologic staging and multidisciplinary management.",cite:G,refer:true};
  if(bigPiecemeal) return {years:0.5,label:"6 months",rationale:"Lesion ≥20 mm removed piecemeal by EMR. Short-interval follow-up is recommended to confirm complete resection of the scar.",cite:G};
  if(nAd>10) return {years:1,label:"1 year",rationale:`${nAd} adenomas identified (>10). Consider evaluation for a polyposis syndrome.`,cite:G};
  if(advanced || nAd>=5) {
    const rl = advanced ? `advanced adenoma (${[...new Set(advFeatures)].join(", ")})` : `${nAd} adenomas`;
    return {years:3,label:"3 years",rationale:`Surveillance interval driven by ${rl}. Findings meet high-risk criteria warranting a 3-year return.`,cite:G};
  }
  if(nAd>=3) return {years:4,label:"3–5 years",rationale:`${nAd} tubular adenomas < 10 mm without advanced features. A 3–5 year interval is recommended.`,cite:G};
  if(nAd>=1) return {years:8,label:"7–10 years",rationale:`${nAd} tubular adenoma${nAd>1?'s':''} < 10 mm without advanced features. A 7–10 year interval is appropriate.`,cite:G};
  if(ssls.some(p=>p.size>=10)) return {years:3,label:"3 years",rationale:"Sessile serrated lesion ≥ 10 mm.",cite:G};
  if(ssls.length) return {years:7,label:"5–10 years",rationale:"Small sessile serrated lesion(s) without dysplasia.",cite:G};
  if(polyps.some(p=>p.histo==="Hyperplastic polyp")) return {years:10,label:"10 years",rationale:"Only small hyperplastic polyps in the rectosigmoid — equivalent to a normal exam.",cite:G};
  return {years:10,label:"10 years",rationale:"No adenomatous tissue identified. Return to average-risk screening interval.",cite:G};
}
function addYears(dateStr, years){
  const d = new Date(dateStr);
  const whole = Math.floor(years);
  d.setFullYear(d.getFullYear()+whole);
  const frac = years-whole; if(frac>0) d.setMonth(d.getMonth()+Math.round(frac*12));
  return d.toISOString().slice(0,10);
}

/* ============================================================
   PASSWORD GATE
   The password is never stored in plaintext — only its SHA-256
   digest is embedded below, so it can't be read off the source.
   (Note: this is a light client-side gate for a demo, not real
   server security — the page content still ships to the browser.)
   ============================================================ */
const PW_HASH = "14749dad27bf77bafce3f6faf556cbf0f559d38751d4490c45b052290ada1dfe";

/* Self-contained SHA-256 (ASCII) — no crypto.subtle dependency,
   so it works over file:// and plain http as well as https. */
function sha256(ascii){
  function rr(v,a){return (v>>>a)|(v<<(32-a));}
  var mp=Math.pow, mw=mp(2,32), res="", words=[], i,j;
  var bitLen=ascii.length*8;
  var hash=sha256.h=sha256.h||[], k=sha256.k=sha256.k||[];
  var pc=k.length, comp={};
  for(var cand=2;pc<64;cand++){
    if(!comp[cand]){
      for(i=0;i<313;i+=cand){comp[i]=cand;}
      hash[pc]=(mp(cand,.5)*mw)|0;
      k[pc++]=(mp(cand,1/3)*mw)|0;
    }
  }
  ascii+="\x80";
  while(ascii.length%64-56)ascii+="\x00";
  for(i=0;i<ascii.length;i++){
    j=ascii.charCodeAt(i);
    if(j>>8)return;
    words[i>>2]|=j<<((3-i)%4)*8;
  }
  words[words.length]=((bitLen/mw)|0);
  words[words.length]=(bitLen);
  for(j=0;j<words.length;){
    var w=words.slice(j,j+=16), oldHash=hash;
    hash=hash.slice(0,8);
    for(i=0;i<64;i++){
      var w15=w[i-15], w2=w[i-2];
      var a=hash[0], e=hash[4];
      var t1=hash[7]+(rr(e,6)^rr(e,11)^rr(e,25))+((e&hash[5])^((~e)&hash[6]))+k[i]
        +(w[i]=(i<16)?w[i]:(w[i-16]+(rr(w15,7)^rr(w15,18)^(w15>>>3))+w[i-7]
        +(rr(w2,17)^rr(w2,19)^(w2>>>10)))|0);
      var t2=(rr(a,2)^rr(a,13)^rr(a,22))+((a&hash[1])^(a&hash[2])^(hash[1]&hash[2]));
      hash=[(t1+t2)|0].concat(hash);
      hash[4]=(hash[4]+t1)|0;
    }
    for(i=0;i<8;i++){hash[i]=(hash[i]+oldHash[i])|0;}
  }
  for(i=0;i<8;i++){
    for(j=3;j+1;j--){
      var b=(hash[i]>>(j*8))&255;
      res+=((b<16)?0:"")+b.toString(16);
    }
  }
  return res;
}
function tryUnlock(e){
  if(e) e.preventDefault();
  const inp=document.getElementById("lock-input");
  const err=document.getElementById("lock-err");
  if(sha256(inp.value)===PW_HASH){
    document.body.classList.remove("locked");
  }else{
    err.classList.add("show");
    inp.value=""; inp.focus();
  }
  return false;
}
